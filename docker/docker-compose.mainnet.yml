# Base mainnet stack.
#
# ⚠️ Real ADA settles in heads spawned against this stack. Read
#    docs/ops/mainnet-deployment.md fully before running:
#      - generate fresh keys via hydra-tools into ../hydra/keys/
#      - front the `pos` service with a TLS-terminating reverse proxy
#      - sync the mainnet cardano-node fully before opening any heads
#
# Per-customer 2-party heads are rendered into ./heads/<head_id>.yml by the
# orchestrator (Phase F). No static hydra-node lives in this base stack.
name: hydra-pos-mainnet

services:
  cardano-node:
    image: ghcr.io/intersectmbo/cardano-node:11.0.1
    volumes:
      - cardano-data-mainnet:/data
      - ../hydra/config:/config:ro
    environment:
      NETWORK: mainnet
    command:
      - run
      - --topology
      - /config/topology-mainnet.json
      - --database-path
      - /data/db
      - --socket-path
      - /data/node.socket
      - --config
      - /config/config-mainnet.json
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hydra_pos
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_DB: hydra_pos
    secrets:
      - postgres_password
    volumes:
      - postgres-data-mainnet:/var/lib/postgresql/data
    restart: unless-stopped

secrets:
  postgres_password:
    file: ../hydra/keys/postgres_password

  cardano-data-mainnet:
    driver_opts:
      type: none
      o: bind
      device: ${CARDANO_DATA_DIR:-./data/cardano-mainnet}
  postgres-data-mainnet:

networks:
  default:
    name: hydra-pos-mainnet
