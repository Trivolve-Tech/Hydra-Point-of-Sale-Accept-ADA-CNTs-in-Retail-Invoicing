version: "3.9"

services:
  cardano-node:
    image: ghcr.io/intersectmbo/cardano-node:10.4.1
    volumes:
      - cardano-data-preview:/data
      - ./hydra-node/config:/config
    environment:
      NETWORK: preview
    command:
      - run
      - --topology
      - /config/topology-preview.json
      - --database-path
      - /data/db
      - --socket-path
      - /data/node.socket
      - --config
      - /config/config-preview.json
    restart: unless-stopped

  hydra-node:
    image: ghcr.io/cardano-scaling/hydra-node:0.20.0
    depends_on:
      - cardano-node
    volumes:
      - cardano-data-preview:/cardano:ro
      - hydra-data-preview:/data
      - ./hydra-node/keys:/keys:ro
    environment:
      HYDRA_SIGNING_KEY: /keys/hydra.sk
      CARDANO_SIGNING_KEY: /keys/cardano.sk
    command:
      - --api-host
      - "0.0.0.0"
      - --api-port
      - "4001"
      - --node-socket
      - /cardano/node.socket
      - --persistence-dir
      - /data
      - --testnet-magic
      - "2"
    ports:
      - "4001:4001"
    restart: unless-stopped

  invoice-backend:
    build:
      context: ../invoice-backend
      dockerfile: ../docker/Dockerfile.invoice-backend
    ports:
      - "7071:7071"
    environment:
      PORT: 7071
    restart: unless-stopped

  merchant-pos:
    build:
      context: ../merchant-pos
      dockerfile: ../docker/Dockerfile.merchant-pos
    depends_on:
      - invoice-backend
      - hydra-node
    ports:
      - "3000:3000"
    env_file:
      - .env.preview
    environment:
      INVOICE_BACKEND_URL: http://invoice-backend:7071
      HYDRA_NODE_HOST: hydra-node
      HYDRA_NODE_PORT: 4001
      HYDRA_ENABLE: "true"
      NEXT_PUBLIC_HYDRA_ENABLED: "true"
    restart: unless-stopped

volumes:
  cardano-data-preview:
  hydra-data-preview:
