# Base preprod stack.
# Per-customer head pairs are rendered into ./heads/<head_id>.yml by the
# orchestrator (Phase F) and brought up separately; they connect to this
# stack's cardano-node via the shared cardano-data-preprod volume and to
# postgres on the hydra-pos-preprod network.
name: hydra-pos-preprod

services:
  cardano-node:
    image: ghcr.io/intersectmbo/cardano-node:10.6.2
    volumes:
      - cardano-data-preprod:/data
      - ../hydra/config:/config:ro
    environment:
      NETWORK: preprod
    command:
      - run
      - --topology
      - /config/topology-preprod.json
      - --database-path
      - /data/db
      - --socket-path
      - /data/node.socket
      - --config
      - /config/config-preprod.json
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hydra_pos
      POSTGRES_PASSWORD: hydra_pos
      POSTGRES_DB: hydra_pos
    volumes:
      - postgres-data-preprod:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  # Dev solo hydra-node — used during Phase C development to validate the
  # in-head fetcher against a single-party head. Real per-customer 2-party
  # heads are spawned by the orchestrator (Phase F).
  hydra-node-dev:
    image: ghcr.io/cardano-scaling/hydra-node:1.3.0
    depends_on:
      - cardano-node
    volumes:
      - cardano-data-preprod:/cardano:ro
      - ../hydra/config:/config:ro
      - ../hydra/keys:/keys:ro
      - hydra-data-dev:/data
    command:
      - --node-id
      - merchant-dev
      - --api-host
      - "0.0.0.0"
      - --api-port
      - "4001"
      - --listen
      - "0.0.0.0:5001"
      - --node-socket
      - /cardano/node.socket
      - --persistence-dir
      - /data
      - --hydra-signing-key
      - /keys/merchant-hydra.sk
      - --cardano-signing-key
      - /keys/merchant-cardano.sk
      - --hydra-scripts-tx-id
      - ${HYDRA_SCRIPTS_TX_ID_PREPROD}
      - --ledger-protocol-parameters
      - /config/protocol-parameters.json
      - --testnet-magic
      - "1"
      - --contestation-period
      - "60"
    ports:
      - "4001:4001"
      - "5001:5001"
    restart: unless-stopped

volumes:
  cardano-data-preprod:
  postgres-data-preprod:
  hydra-data-dev:

networks:
  default:
    name: hydra-pos-preprod
